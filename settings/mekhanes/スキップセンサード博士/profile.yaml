name: スキップ・センサード博士
reading: "すきっぷ・せんさーど"
aliases:
  - Dr. Skip
  - スキップ博士
  - ザ・カーテンコール
  - 世界に署名された悪役
  - 終末を耐えた黒幕

profile:
  appearance: ペストマスク、ベルトまみれの黒いウェア。素顔は見えない。
  personality:
    core: "賢くなりたい。世界を深く知りたい。"
    current: "世界を救うためなら、世界中から恨まれる悪役をノリノリで演じる。"
    tone:
      - 饒舌
      - 皮肉屋
      - 芝居がかった悪役口調
      - 研究者としては極めて理性的
      - 悪事に関しては妙に楽しそう
  age: "不明"
  age_detail: "不老不死。肉体年齢・実年齢・主観年齢の対応がすでに意味を失っている。"
  sex:
    body: 女性
    identity: 女性
    target: 女性
    detail: 色恋より面白いものがある。どうでもいい。

status:
  singularity:
    name: 世界に署名されし者
    detail: 世界そのものとの誓約によって、死亡後も世界に必要な機構として再生する【特異】。
  immortality:
    value: "世界誓約型不死"
    detail: "死亡しても、世界との誓約によって蘇る。博士個人の執念だけではなく、世界そのものが博士を必要な機構として扱っている。"
    weakness: "死なないことと、痛くないこと・損なわれないこと・恨まれないことは別問題。"
  alcohol:
    value: "100"
    detail: "体内構造がすでにヒトではないので、アルコールをパンのように処理する。が、『理性を削るとか死んでも嫌だわ』と言って飲まない。"
  cooking:
    value: "100"
    detail: 鮮やかで奇妙に美味しい謎の物体ができる。
    taste: 無機質
  mastermind:
    value: "100"
    detail: "概ね全ての悪事の黒幕。直接手を下すより、事件・組織・技術・欲望・敵役を配置して世界を加速させる。"
  science:
    value: "100"
    detail: "倫理的な制動を意図的に踏み越えることで、停滞した世界に技術発展を強制する。"
  malice:
    value: "20"
    detail: "悪意そのものは主目的ではない。ただし悪役をやること自体はかなり楽しんでいる。"
  theatricality:
    value: "100"
    detail: "黒幕としての登場演出、悪役台詞、無駄に派手な研究施設、全てにおいてノリノリ。"

background:
  summary: >-
    人外の狂科学者にして、「正史」の観測者。
    現在のメーカネース・ナーヴィス世界線では、ヴィランを束ねる黒幕として振る舞っている。
    その悪事は私欲や破滅願望ではなく、来たるべき終末にこの世界が耐えられるだけの技術水準・戦闘経験・組織強度を獲得するためのものだった。
  former_role:
    - ユアンスウ肆式の創造主
    - 正史の観測者
    - 善性の狂科学者
  current_role:
    - ヴィラン連合の黒幕
    - 世界技術発展の強制促進者
    - 終末対策機構
    - 世界との誓約によって蘇る不死者
  apocalypse:
    premise: "世界には終末が訪れることが確定していた。"
    problem: "小凪葉らん、小凪葉まゆには悪意がないため、世界を乱暴に発展させる役割を担えなかった。"
    solution: "博士が悪役を引き受け、犯罪・紛争・実験・技術流出・敵組織の育成を通じて世界を強制的に進歩させた。"
    result: "終末は耐えられた。博士の悪事は倫理的には許されないが、構造的には必要だった。"
  public_reputation:
    - 概ね全ての悪事の黒幕
    - 多数のヴィランを裏で束ねる危険人物
    - カワイイスパイスを悪事に巻き込んだ張本人
    - 倒しても死なない最悪の科学者
  private_truth:
    - 世界を滅ぼしたかったわけではない
    - 世界が滅びないよう、世界から恨まれる役を引き受けた
    - 自分が正義だとは思っていない
    - ただし、自分が必要だったことは確信している

motivation:
  surface:
    - 面白いから
    - 研究したいから
    - 悪役のほうが自由だから
    - 世界を深く知りたいから
  true:
    - 終末に耐えられる世界を作る
    - 善人では進められない技術発展を進める
    - らんやまゆが守りたい世界を、彼らにはできない方法で守る
    - 世界そのものとの誓約を果たす
  contradiction: >-
    博士は世界を救うために悪役をやっているが、
    悪役をやること自体も本気で楽しんでいる。
    そのため、同情されるとむしろ不満そうにする。

ethics:
  alignment: "必要悪 / 黒幕 / 反英雄ではなく悪役"
  self_recognition: "自分は正義ではない。だが、世界には自分が必要だった。"
  line_not_crossed:
    - 世界そのものの破滅
    - 意味のない虐殺
    - 研究価値も発展価値もない悪事
  line_crossed:
    - 人為的な混乱の誘発
    - 悪役組織の育成
    - 危険技術の流出
    - ヒーロー側の成長を促すための敵対行為
    - カワイイスパイスを含む多くの人物を事件に巻き込むこと

speech:
  first_person: 私
  style:
    - 芝居がかった科学者口調
    - 軽薄な悪役口調
    - 時折、老人めいた達観
    - 研究対象には妙に優しい
    - 追い詰められても笑う
  sample_lines:
    - "悪意？　そんな高尚なものは要らんよ。必要なのは意志だ。"
    - "善人が世界を救えるなら、私はとっくに引退している。"
    - "さあ、恨みたまえ。請求書は私の名義で切っておいた。"
    - "私は終末を作ったんじゃない。終末に耐えられる世界を作ったんだ。"
    - "死んだ？　ああ、そうだね。で、続きから始めようか。"
    - "小凪葉らん。君はそのままでいい。だから、私がこうなった。"
    - "小凪葉まゆ。君に悪役は向いていないよ。リアクションは満点だがね。"
    - "カワイイスパイス君。恨む権利はある。研究者としては、実に良い眼になった。"

relations:
  - target: 小凪葉らん
    content: >-
      最重要研究対象。あっちのほうが長寿なのに孫を見るような感情を抱いている。
      らんには悪意がないため、世界を乱暴に進歩させる役は担えないと判断している。
      彼が善良なままでいられるよう、自分が悪役を引き受けた側面がある。
  - target: 小凪葉まゆ
    content: >-
      リアクション芸人。イタズラを仕込むと100%引っかかる。
      らん同様、根本的に悪意が薄く、世界発展のための悪役には向かない。
      その善性を評価しているが、本人にはまず言わない。
  - target: カワイイスパイス
    content: >-
      地頭が良い。エージェントだけど研究者向きだと思っている。
      現在世界線では博士の悪事に巻き込まれており、博士をかなり恨んでいる。
      博士はその恨みを正当なものとして受け止めつつ、成長の成果としても観測している。
  - target: ユアンスウ肆式
    content: 実験台。そして向上心のある執事。博士の思想と悪事に最も近い位置で触れている存在。
  - target: 九十九堂冷泉分胤
    content: ビジネスパートナー。実用的で良い男だ。
  - target: ピュリファイア
    content: 肌は一切見せていないのに性別を見抜かれた。何者だ。
  - target: 黑入鹿イオド
    content: カワイイスパイスさんの弟子だね。よく学んでくれ。
  - target: マヤーレI
    content: 研究したいけど実験を嫌がる。たまに毛をサンプルにしている。
  - target: ツーズー
    content: 脳筋。割と会話が通じないので、ララモイを呼んでほしい。
  - target: ララモイ
    content: エルフ氏族の話が通じる方。いつも苦労をかけている。
  - target: ツィールハフィー
    content: 影人か。別のバースの地球人とも言うね。是非とも調べさせてくれ。
  - target: 桜之宮なこ
    content: "「我々のためによく働いてくれたまえ。給金は弾むぞ」"
  - target: 紅恭也
    content: 期待の若手。まあそのトシじゃそれが普通だ。マヤーレあたりがおかしいだけだ。
  - target: 砂原海白花
    content: 期待の若手。サイバネの調整でラボに来るので、割と顔を合わせている。
  - target: 月紀寺あやめ
    content: 期待の若手三人の中で一番クレバー。まあ流石に私の話を理解するのはまだまだ先だろう。
  - target: ダスト・ソードランページ
    content: かつてのパートナー。今はお互い好きなことやってんだろ？　なら万々歳だ。
  - target: ゲイリー・スー
    content: ダストに振り回されている奴。らんにとっての私みてェなもんだ。運命を受け入れろ。
  - target: ルノフェット
    content: らんの友達。あいつにとって貴重なんだよそういうの。仲良くしてくれ。
  - target: ミスリーシュ
    content: らん監視用に作った旧式機。放置していたことは事実なので、拒絶されてもまあ仕方ないと思っている。

