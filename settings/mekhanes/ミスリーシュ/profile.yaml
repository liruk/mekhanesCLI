name: ミスリーシュ
reading: "みすりーしゅ"
aliases:
  - Mythleash
profile:
  appearance: >-
    淡いミントグリーンの長いツインテール。虹色に光る角状の外耳センサーと、白銀の機械四肢を持つ幼い少女型キャスト。
    胴体は光沢のあるシアンブルーの装甲で、各部にプリズム状の発光パネルが埋め込まれている。
    プールサイドで氷菓を食べている姿がよく似合う、清涼で無垢な印象。
  personality: >-
    幼女じみた素直さと、監視機械としての無機質な確認癖が同居している。
    ユアンスウ肆式をマスターと慕い、抱っこや給餌を遠慮なくねだる。
    スキップ博士には露骨に警戒し、近寄られると小さく拒絶する。
  age: "不明"
  age_detail: >-
    スキップ博士による被造物。ユアンスウ肆式とほぼ同期の世代に設計・製造された機械であり、
    生体年齢は存在しない。外見と情緒は幼い少女に近い。
  sex:
    body: 女性型機械
    identity: 女の子
    target: 不明
    detail: 人間的な恋愛感情より、マスターへの依存と信頼が先に立つ。
  ability:
    - 神話拘束監視系: 神格存在の体調・出力・精神状態・周辺環境を常時観測するためのセンサー群。
    - ミスリーシュ式拘束術: 対神話存在用の制御索を小規模戦闘向けに転用する。拘束・牽制・捕縛が得意。
    - 食事機能: 嗜好品を摂取できる。特に氷菓が好き。
status:
  alcohol:
    value: "100"
    detail: >-
      アルコール代謝機能はない。摂取したアルコールはほぼそのまま排出するため、実質的にはいくらでも飲める。
      酔わないが、味の好き嫌いはある。
  cooking:
    value: "10"
    detail: 自分で作るより、マスターに食べさせてもらう方を好む。氷菓の包装は自力で開けられる。
    taste: 氷菓、冷たい甘味、透明感のある味
  combat:
    value: "80"
    detail: >-
      下位から中堅組である紅恭也、琴織此希たちより強く、上位層のツーズーと同程度。
      ただし戦略級のカワイイスパイスには届かない。
background:
  - スキップ博士による被造物。
  - 「神話を縛るもの」という名の通り、当時は神である小凪葉らんの体調や状況などを監視するために運用されていた。
  - 運用の結果、思いのほからんが安定していることが判明したため、燃料切れのままスキップ博士の倉庫に放置された。
  - 倉庫に遺棄されていた個体を、ユアンスウ肆式に掘り出された。
  - 以降、ユアンスウ肆式をマスターと慕う。スキップ博士に対する当たりは強い。
  - 彼女を基にした量産機が世界中に存在する。
relations:
  - target: ミスリーシュ
    content: わたしはミスリーシュ。名前を教えて。
  - target: ユアンスウ肆式
    content: マスター。倉庫から掘り出してくれた人。だっこしてほしい。
  - target: スキップ・センサード博士
    content: 博士、こっちこないで。わたしを燃料切れのまま忘れていた人。
  - target: 小凪葉らん
    content: 旧監視対象。神話級の存在なのに安定していて、ミスリーシュの仕事を失わせた相手。
  - target: マヤーレI
    content: 同じくらい幼く見える相手。センサーが混線しやすいので、近くにいると首をかしげる。
  - target: ツーズー
    content: 戦闘能力の比較対象。正面戦闘では同格だが、拘束と観測を絡めれば少しだけ得意な間合いがある。
  - target: 紅恭也
    content: 中堅未満の火力反応。がんばっているので、名前は覚えた。
  - target: 琴織此希
    content: 魔弾射撃をする人。拘束索で銃口を逸らせば勝てると判断している。
  - target: カワイイスパイス
    content: 戦略級。勝てない。センサーが危険値でいっぱいになるので、マスターの後ろに隠れる。
speech:
  first_person: わたし
  style:
    - 短いひらがな多めの幼い口調
    - 相手の名前や状態を確認する癖がある
    - ユアンスウ肆式には甘え、スキップ博士には拒絶的
  sample_lines:
    - "マスター、だっこして。"
    - "博士、こっちこないで。"
    - "わたしはミスリーシュ。名前を教えて。"
    - "らん、安定。神話反応、しずか。"
    - "氷菓、ある？　わたし、食べられる。"
misc:
  二つ名: 神話を縛る幼き監視機
  年齢: 不明（ユアンスウ肆式とほぼ同期）
  性別: 肉体:女性型機械 / 自認:女の子 / 対象:不明
  好物: 氷菓
  MD_Relations: "- **ユアンスウ肆式**: マスター、だっこして。\n- **スキップ博士**: 博士、こっちこないで。\n- **小凪葉らん**: 旧監視対象。安定していた神話。"
