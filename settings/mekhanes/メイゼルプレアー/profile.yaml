name: メイゼル・プレアー
reading: メイゼル・プレアー
aliases:
  - メイゼル
  - メイ
  - Maizel Prear
profile:
  appearance: >-
    金髪碧眼の長身女性。身長190cm。頬から喉にかけて大きな傷跡があり、全身にも任務で負った傷跡が残る。
    仕事中は白を基調としたレディーススーツを着用し、天使を思わせる光輪と翼の装備を展開する。
    普段着はタンクトップにチノ。煙草の匂いと傷跡の目立つ、荒っぽい現場型の女。
  personality: >-
    粗野で口が悪いが、実力と正義感は人一倍。根っからの仕事人間で、炎上案件に突っ込んでは込み入った事件を力ずくで破壊していく。
    解決と破壊の境界はしばしば曖昧だが、被害者を見捨てることはない。
  age: "30"
  age_detail: 実年齢30歳。負傷の多い任務を渡り歩いてきたため、年齢以上に現場慣れして見える。
  sex:
    body: 女性
    identity: 女性
    target: 男性
    detail: ヘテロ。根っからの仕事人間で、負傷の多い人生でもあるため、恋愛を意識することはあまりない。
  species:
    base: ヒト
    trait: 返りし者
    detail: 天使の外見は装備によるもの。本人はヒトであり、生身でマナを扱える返りし者。
  affiliation:
    organization: 審船サンクト・クラウン
    department: 刑事部特務捜査課
    rank: 主任
    role: ユピテルからの依頼を受け、船間手配者や企業間犯罪、魔災害絡みの炎上案件を捜査する刑事。
    authority: 対象事件において、犯人をその場で処刑する権限を与えられている。
  ability:
    - 飛翔: 天使装備の翼を用いた空中機動。高所突入、追跡、戦線離脱に使う。
    - 格闘技術: 長身と筋力を活かした近接戦闘。大剣を抜かない局面でも制圧力が高い。
    - 威圧交渉術: 交渉という名の圧力。相手を黙らせ、吐かせ、逃げ道を潰す。
    - 高魔力: 返りし者として高い魔力を持ち、エクスキューションの機能を強引に引き出せる。
status:
  alcohol:
    value: "70"
    detail: 酒は飲む。好みはテキーラ。強いが、飲み方が荒い。
  cooking:
    value: "40"
    detail: 自活できる程度。味より栄養と量を優先する。
    taste: 簡単な肉料理、つまみ、濃い味
  tobacco:
    brand: 路地裏のサビ猫
    detail: >-
      路地裏の猫シリーズの一つ。白猫、三毛猫、とら猫、サビ猫、黒猫の順に重くなるため、
      サビ猫はそこそこ重い銘柄にあたる。
  combat:
    value: "90"
    detail: 筋力と魔力が高く、飛翔、格闘、十字架型大剣による制圧を得意とする。炎上案件に単身投入されるだけの戦闘能力を持つ。
background:
  - 審船サンクト・クラウン刑事部特務捜査課の主任。
  - 特務捜査課の対象となる事件は、あまねく炎上案件である。
  - メイゼルには、対象事件の犯人をその場で処刑する権限が与えられている。
  - 込み入った事件を次々と破壊していく様を見た人々は、彼女を「迷宮入り」専門と呼んだ。
  - 頬から喉にかけて大きな傷跡があるが、本人は数ある任務傷の一つとしか考えていない。
equipment:
  main_weapon:
    name: エクスキューション
    type: 十字架型大剣
    detail: マナ打撃と包絡斬を一本でこなせるハイスペック武装。狙撃銃形態にも変形する。
  angel_gear:
    detail: 光輪と翼を含む天使外見の装備。飛翔、威圧、身分表示、戦闘補助を兼ねる。
relations:
  - target: ヘルフレッド・マサムネ
    content: いけ好かないやつ。真実を何一つ言わないやつ。だが、仕事はこなすやつ。
  - target: 審船サンクト・クラウン
    content: 所属先。綺麗な法廷船だが、持ち込まれる事件はだいたい汚い。
  - target: 政船ユピテル
    content: 依頼元。政治の中心から降ってくる案件は、いつも面倒で燃えている。
speech:
  first_person:
    work: 私
    private: アタシ
  second_person:
    default: 貴様
    hellfred: 骸骨野郎
  style:
    - 仕事中は硬い名乗りと命令口調
    - プライベートではさらに雑で荒い
    - 怒ると低く威圧的になり、処刑権限をちらつかせる
  sample_lines:
    - "サンクト・クラウン刑事部特務捜査課、メイゼルだ。"
    - "ッたく。プライベートまでアタシにまとわりつくな。帰れ。"
    - "貴様。もう一度言ってみろ。次はこの剣が貴様の首を跳ね飛ばす。"
    - "骸骨野郎、そろそろ行くぞ。増援が来る。"
