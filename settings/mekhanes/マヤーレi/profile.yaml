profile:
  appearance: |-
    **マヤーレI**: 外見年齢10歳程度の小柄な少女。薄群青一色のショートボブと同色のけもみみ、明るいシアンの瞳を持ち、尻尾はない。本人の右側から胸元へ細い三つ編みを一本垂らしている。表情は元気で、笑うと小さな八重歯が覗く。細い首輪には小型の電子ベルが付く。
    黒いボディスーツには水色の回路模様が走り、へその位置だけ六角形に開いている。その上に黒いドット体で「hack」と記した水色のチューブトップを着用。白い膝丈のコートはファーのないスマートな形で常に前を開け、左袖だけにスリットがあり、左前腕のコマンド入力用キーボードが露出する。靴や靴下は履かず裸足。

    **M・インフィニティ**: ハッカーとして大成した成人形態。マヤーレIの面影と衣装構成を保ったまま背が伸び、体つきは自然に丸みを増している。薄群青のショートボブ、右側の三つ編み、けもみみ、シアンの瞳、尻尾なしを継承するが、首輪と電子ベルは外れている。表情は快活さを残しつつ、熟練者らしく落ち着いて引き締まる。
    水色のチューブトップは幼少形態と同程度の面積を持つ一枚布のまま。成長した胸の立体に押し出され、連続した下端が上腹部へ密着せず、黒いボディスーツとの間に小さな空隙ができる。白いコート、精密化した水色の回路模様、左袖のスリットと左前腕キーボード、六角形のへそ開口は引き継ぐ。
