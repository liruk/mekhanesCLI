profile:
  age: "17"
  appearance: >-
    健康的な小麦色の肌をした、金髪碧眼の少女。金髪はミディアム丈のストレートで、前髪はぱっつん。
    勝気な目つきをしている。胸は豊かだが、鎧に収めるためサラシで押さえている。
    白銀のプレートメイルをまとい、股を守る前垂れには十字の意匠がある。
  personality: >-
    勝気で負けず嫌い。平民の肉屋から騎士へ上がった経歴を持ち、家柄ではなく働きと実力で
    自分の価値を証明しようとする。
