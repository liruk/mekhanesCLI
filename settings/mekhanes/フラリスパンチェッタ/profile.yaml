world:
  rilgam:
    name: リルガム
    type: 惑星規模実験区域 / 観察惑星
    administrator: ミルフィッカ兄弟
    possibility_index: "15前後"
    civilization_level: 中世相当
    overview: >-
      ミルフィッカ兄弟領の観察惑星。実験のため、現地社会の文明レベルは意図的に
      中世相当へ抑えられている。住民は星間文明の存在を原則として知らず、騎士、領主、
      職人の組合などを基盤とする社会を営む。
    experiment:
      purpose: 文明抑制環境における人間社会、魔物生態系、魔物素材利用の長期観察
      controls:
        - 星間技術および星外情報の流入制限
        - 現地文明を急速に発展させる技術の回収または秘匿
        - 軌道上または偽装施設からの継続観察
      public_knowledge: >-
        現地住民にとって、管理者や観察者の存在は神話、天変地異、禁忌などとして解釈される。
    local_notes:
      - 魔物と、それを加工する肉屋、革職人、鍛冶師が生活圏に密接している。
      - 騎士身分は貴族に独占されておらず、功績による平民の叙任もあり得る。
      - 星外から見れば実験区域だが、住民にとっては唯一の現実世界である。
