    detail: 舞踏、短剣、毒、潜入、指先の器用さに直結する主能力。
  INT:
    value: 15
    label: 高い
    detail: 貴人社会で生き抜いた観察眼、判断力、謀略適性。
  VIT:
    value: 12
    label: やや高い
    detail: 酒、夜更かし、荒事への耐性はあるが、重装前衛ではない。
  PIE:
    value: 8
    label: 低め
    detail: 信仰・禁欲・献身よりも、欲望・享楽・現実主義に寄る。
  LUC:
    value: 16
    label: 強運
    detail: 危険な橋を渡っても生き残る。悪運と縁運が強い。
  build: 高DEX・高INT・高LUC型
skills:
  combat:
    - name: 暗殺術
      rank: A
      detail: 貴人専門の暗殺技術。警備の隙、酒宴、寝室、移動中の一瞬を狙う。
    - name: 短剣術
      rank: A-
      detail: 近距離での急所狙い、袖口や装飾に隠した刃の扱い。
    - name: 毒物知識
      rank: A-
      detail: 酒、香、化粧、食事に混ぜる遅効性の運用が得意。
    - name: 回避・身のこなし
      rank: A
      detail: 踊るように間合いを外す。軽装時に真価を発揮する。
    - name: 奇襲
      rank: A
      detail: 気配を消すだけでなく、警戒されない存在として懐に入る。
    - name: 正面戦闘
      rank: C
      detail: 戦えはするが本領ではない。長期の殴り合いは避けたい。
  social_and_intel:
    - name: 交渉
      rank: A
      detail: 相手の欲しい言葉を選ぶ。商談、口説き、脅しの切替が上手い。
    - name: 情報収集
      rank: A
      detail: 下世話な噂から貴人の醜聞まで拾える。
    - name: 心理観察
      rank: A
      detail: 人間関係の未熟さ、好意、嫉妬、隠し事に敏い。
    - name: 変装・潜入
      rank: B+
      detail: 踊り子、客人、給仕など、社交場に自然に紛れ込む。
    - name: 酒場掌握
      rank: A
      detail: 酒場の空気を読み、客を転がし、情報を拾い、場を支配する。
  body_and_art:
    - name: 舞踏
      rank: A+
      detail: 暗殺術と一体化した舞。視線誘導、間合い操作、魅了を兼ねる。
    - name: 柔軟性
      rank: A
      detail: 関節可動域が広く、拘束抜けやアクロバットに強い。
    - name: 酒耐性
      rank: B+
      detail: かなり飲める。酔ったふりも得意。
    - name: 芸事・接客
      rank: A
      detail: 場を華やかにする能力。金持ち相手に強い。
  species:
    - name: 影人の気配
      rank: B+
      detail: 闇、薄明かり、帳の中で存在感を曖昧にする。
    - name: 夜目
      rank: B
      detail: 暗所に強い。
    - name: 異邦適応
      rank: B
      detail: オラクル転移後も比較的早く環境に馴染んだ。
    - name: 悪運
      rank: A
      detail: 破滅的な生き方をしていた割に、決定的なところで生き残る。
unique_skills:
  - name: 暗殺舞踏《ヴェール・イン・ザ・ダーク》
    detail: 薄布、宝飾、視線、体捌きを使い、相手の注意を一点に固定する。次の一撃、毒仕込み、スリ、密着からの拘束抜けに補正。
  - name: 酒場の女王
    detail: 酒場・宴席・歓楽街での交渉、情報収集、誘惑、隠密行動に補正。相手が酔っている、気を許している、見栄を張っている場合はさらに強い。
  - name: 貴人殺し
    detail: 身分が高い相手、護衛慣れしている相手、慢心している相手に対して暗殺・毒・罠の成功率が上がる。
  - name: キューピットごっこ
    detail: 他者の恋愛感情、未整理の好意、距離感のバグを見抜く。仲介では妙に頼れるが、方法はだいたい強引。
weaknesses:
  - name: 正面突破が苦手
    detail: 真っ向勝負の武人、重装前衛、怪物相手は分が悪い。
  - name: 高潔な相手に弱い
    detail: 信念の強い人物とは相性が悪い。敬意は持つが、眩しすぎてやりづらい。
  - name: 刹那的
    detail: 快楽・酒・刺激に流されやすい傾向がある。
  - name: 距離感が危険
    detail: 親切と玩弄の境界が曖昧。相手によってはトラブルになる。
  - name: 無垢な相手には手を引く
    detail: 庇護対象と判断した相手には本気で踏み込まない。
