background:
  summary: 影人〈シャドウリング〉の暗殺舞踏者。かつては貴人専門のアサシンとして生きていた。現在は酒場や社交場を根城に、情報収集と人間関係の駆け引きを楽しんでいる。
  details:
    - 元の世界では貴人専門のアサシン。
    - 正面突破よりも、潜入・観察・奇襲・毒物運用を得意とする。
    - オラクル転移後は、殺し一辺倒の生き方から距離を置きつつある。
    - 酒場、舞踏会、裏取引の場で真価を発揮する。
status:
  alcohol:
    value: 75
    scale: 0-100
    detail: かなり飲める。酒場の空気を読み、酔った相手から情報を引き出すことにも長ける。
attributes:
  scale_note: 10を一般人平均、20を人外級上限とした目安。
  STR:
    value: 9
    label: 標準やや下
    detail: 暗殺者型。力押しや重武器は得意ではない。
  DEX:
    value: 18
