name: シルヴィアナ・メギルクロック
reading: "しるゔぃあな・めぎるくろっく"
aliases:
  - シルヴィアナ
  - Sylviana Megilclock
profile:
  age: "21"
  appearance: >-
    ダークシルバーの長髪と赤い瞳を持つ、二十一歳の令嬢。右目を薔薇の意匠を施した眼帯で覆い、
    黒を基調とするゴシックドレスを着る。右手から前腕にかけては包帯に覆われている。
    没落後も立ち居振る舞いの気品は崩さず、捜査の場では華美な装いそのものを威圧と交渉の道具にする。
  personality: >-
    礼節と冷静さを鎧にした執念深い現実主義者。社交界仕込みの微笑みで相手の懐へ入り込み、
    父の死に関わる嘘だけは決して見逃さない。失った家名と権力を嘆くより、残された財力と人脈を捜査へ注ぎ込む。
  ability:
    - 短剣術: ドレスの内側に隠した短剣を用いる。護身術の体裁を保ちながら、近距離で急所を正確に狙う。
    - 社交術: 礼儀、会話、観察、駆け引きを通じて情報を引き出し、敵対者とも一時的な合意を成立させる。
    - 財力: 継承権喪失後も個人名義で残った資産を、調査費、移動、装備、協力者への報酬に投入する。
    - 人脈: 旧経営陣、社交界、企業法務、警備部門など、メギルクロック家時代に築かれた接点を活用する。
  sex:
    body: 女性
    identity: 女性
    target: 不明
    detail: ゲイリー・スーとは協力関係を越えた肉体関係も噂されるが、双方とも明言しない。
background: >-
  スカイハブ元CEOの一人娘。後継者として育てられたが、父の失脚に伴って継承権を失った。
  ほどなく父は殺害され、公式には失脚後の私怨または事故に近い事件として処理されたが、シルヴィアナは計画的な口封じだと見ている。
  現在はゴシック衣装の令嬢という旧来の顔を保ったまま捜査官として活動し、父を失脚させ、殺害した犯人を追う。
  右目の眼帯と右手の包帯が事件に由来するかどうかは、本人が語ろうとしない。
relations:
  - target: スカイハブ
    content: 父がCEOを務め、自身も継承者だった企業。継承権を奪った現体制の内部に、父の失脚と死の手掛かりがあると疑っている。
  - target: 父（スカイハブ元CEO）
    content: 失脚後に殺害された父。尊敬だけでは割り切れない複雑な感情を抱くが、その死を闇へ葬ることだけは許さない。
  - target: ゲイリー・スー
    content: 情報収集と裏社会への接触で手を組む協力者。軽薄さを信用してはいないが、土壇場で逃げない点は評価している。私的な関係について問われると、薔薇の眼帯に触れて微笑むだけ。
misc:
