name: セシャト・ラガシュ
reading: "せしゃと・らがしゅ"
aliases:
  - Seshat-Lagasy
  - セシャト
profile:
  appearance: 黒ヒョウ柄のバンダナとゴーグルを身につけた、活動的な金髪ショートの少女。瞳はダークブラウンで、肌は白い。軽装の黒いチューブトップと、多数のポケットを備えた黒いカーゴパンツ、スニーカーを着用する。
  personality: "陽気で、ひどい目に遭ってもめげない。危険を顧みず、騒ぎさえ楽しんで前へ進む。"
  age: "16"
  age_detail: 16歳。
  ability:
    - 敏捷性・器用度特化: パルクールを交えた身軽な移動と、精密な手作業を得意とする
    - 物理鍵開け: 開けられる構造の物理鍵であれば、たいてい解錠できる
    - 怪盗七つ道具: ピッキングツール、盗聴器、煙幕手榴弾などをカーゴパンツに収納している
  sex:
    body: 女性
    identity: 女性
    target: 未設定
    detail: 男の子をからかうのが趣味
status:
  alcohol:
    value: "0"
    detail: 飲めない。飲まされるとすぐに真っ赤になる。
  cooking:
    value: "50"
    detail: それなりにできる。パン屋の手伝いにも困らない程度。
    taste: エトワールのパン
background: >-
  - サンクチュアリ・ルームス傘下の穏やかな居住区域を本拠地としている。
  - 区域内のパン屋「エトワール」で、ピンチヒッターとして接客を担当する。積極的に客へ絡みに行くが、店主からは意外と接客に向いていると評されている。
  - 生き別れになった妹がおり、両親は行方知れず。
  - 世界をまたにかけて妹を探すための口実として怪盗になった。
  - どの星にも属さず、船へ密航して星々を移動する。
  - 警備の甘い辺境惑星の領主を好んで狙い、宝飾品や高級装備品を盗む。経費とわずかな利益だけを回収し、残りは人々へ配る。
  - 人間は基本的に殺さない。一方、警備用の魔法生物やゴーレムは破壊する。
  - 怪盗としてはほぼ無名だが、チェイサートグループから興味を持たれている。
relations:
  - target: マヤーレI
    content: 論理鍵を破る必要がある際、成長した彼女をサイドキックとして雇うことがある。依頼した時点で、怪盗としての素性まで完全に調べ上げられている。
  - target: チェイサートグループ
    content: 怪盗としてはほぼ無名ながら、なぜか興味を持たれている。
  - target: 紅恭也
    content: 似た内容の仕事を別口から受けたことで、彼のグループと現場付近ですれ違ったことがある。
  - target: 砂原海白花
    content: 紅恭也たちとのニアミスの際、怪盗姿では隠していた素顔を見られた。
misc:
