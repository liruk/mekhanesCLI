background: >-
  オブリビオン・インダストリーズの代表として振る舞うが、本人は「妾がオブリビオン」と宣言する。
  母船にして主星である涜船エグジラの女王であり、指揮生体核と接続して数億規模の生命を資産・兵器・商品として管理していた。
  カワイイスパイスの半淫魔化改造には、スキップ・センサード博士との共同事業として関与し、カワイイスパイスの肉体と【星を保つ死の瘴気】を自社成果物として回収しようとした。
  星間歴3821年、幻想公司およびコーポ・アレスとの戦争でエグジラが崩壊。カワイイスパイスによって所有命令と徴収線を断たれ、最後は星の女王ではなく一人分の身体として死亡した。
relations:
  - target: カワイイスパイス
    content: 不完全な改造体から【特異】へ至った成果物として所有・回収しようとする。瘴気と肉体の権利を主張し、弟子を人質に服従を迫った。
  - target: 黑入鹿イオド
    content: カワイイスパイスを従わせるための人質として扱う。生命維持や処分命令を脅迫材料にした。
  - target: ピュリファイア
    content: 浄火による接続焼却を警戒する相手。生体マナが一人分ではないことを見抜かれ、支配構造を暴かれた。
  - target: スキップ・センサード博士
    content: カワイイスパイス改造の共同事業者。博士の観測欲とノワルミアの所有欲は噛み合うが、完全な忠誠関係ではない。
  - target: 琴織此希
    content: エグジラ支配下の実験体・射撃個体の一人。オブリビオン崩壊の混乱で亡命した。
  - target: オブリビオン・インダストリーズ
    content: 代表であり、同時に企業そのものを自称する。会社ではなく自分の星、自分の身体、自分の所有物として扱う。
  - target: 涜船エグジラ
    content: 母船であり主星であり玉座。ノワルミアはエグジラと直結し、「エグジラは妾。妾はエグジラ」と語る。
