  age_detail: 星間歴3821年時点で実年齢142歳前後と想定。外見は幼い少女だが、子供には見えない威圧と老成がある。星間歴3821年、涜船エグジラ崩壊時に死亡。
  appearance: 白い肌、長い黒髪、赤紫の瞳。背丈はカワイイスパイスより低く、幼い少女の姿をしている。身体に合わせた赤紫または黒のドレスを着用し、王冠だけが少し大きく見える。赤紫の血を流し、戦闘時には背中へ赤紫の生体管が接続され、ドレスが管を通すために変形する。黒い布の隙間から細い金属骨格と生体端子が見える。
  personality: "妾がオブリビオンじゃ。所有と支配を当然視する、幼い女王の顔をした企業そのもの。"
  ability:
    - エグジラ直結:
        涜船エグジラと自身を同一視し、壁・床・外郭砲台・培養槽・生体兵器を一つの身体のように動かす。
    - 指揮生体核:
        エグジラの生体核を介し、星中の生命と命令系統を支配する。所有宣言を命令へ変換する中枢を持つ。
    - 生命徴収:
        接続下の兵士・商品・培養個体・実験体から生命活動、マナ、再生力、痛みを徴収し、自身の再生や攻撃に用いる。
    - 損傷転送:
        自分や母船への損傷を接続された生命へ分配する。ノワルミアを傷つけることが別の実験体を傷つける盾になる。
    - 赤紫のマナ:
        赤紫の障壁、光、槍、包絡を生成する。物理的な槍術や格闘にも長け、小さな身体だけでもカワイイスパイスを捕縛できる。
    - 生体再生:
        エグジラや接続生命から供給を受ける限り、裂けた皮膚や深い傷を短時間で塞ぐ。
