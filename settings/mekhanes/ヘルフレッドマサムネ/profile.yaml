profile:
  appearance: >-
    角の生えた骸骨頭を持つ男性。身長175cm。黒いストライプスーツ、シルクハット、シルクの手袋を身に着ける。
    骨と装備をキネシスで動かしているため、傷を負うことは少ない。
    眼窩の奥には赤い光が灯り、必要に応じてカメラやセンサーを仕込む。
  personality: >-
    慇懃で、愛嬌と言いくるめと説得を使い分ける老練な探偵。態度は丁寧だが、過去も本音も簡単には明かさない。
    かつて監視と心理操作の中枢にいた者として、隠されたものを見つけ、相手の選択肢を静かに奪うことに長ける。
  age: "233"
  age_detail: 実年齢233歳。外見年齢は該当しない。おおよそ170年前、生身の肉体の死と同時期に骸骨頭となった。
  sex:
    body: 骨と残留思念
    identity: 男性
    target: 女性
    detail: >-
      ヘテロ。ただし復活前から老人であったこともあり、性欲自体が非常に薄い。
      肉体的な器官がないため行為もできない。必要とあらば道具を使う程度の距離感。
  species:
    base: 人間だったもの
    trait: 骨と残留思念
    detail: 生身の肉体はすでに死亡している。骨と残留思念が本体であり、キネシスで骨や装備を動かしている。
  affiliation:
    organization: オブシディアン・セキュリティ
    title: 上級エージェント
    external_role: サンクト・クラウン外部顧問
    former_organization: ネクロコム・サーヴィランス
    former_title: 研究室統括
    detail: 元ネクロコム・サーヴィランスの重鎮。現在はオブシディアン所属の上級エージェントとして、サンクト・クラウンの捜査に協力する。
  ability:
    - キネシス: 骨と装備を遠隔的に動かす。自身の身体維持、戦闘、細かな作業に用いる。
    - 仕込み骨格: 骨の体を活かし、体中のあらゆる箇所に装置を仕込める。眼窩のカメラ、センサー、通信機など。
    - 監視技術: 元ネクロコム研究室統括として、監視機器、心理解析、証拠追跡に精通している。
    - 交渉術: 愛嬌、言いくるめ、説得を使い分ける。相手の虚栄心や恐怖を丁寧につつく。
