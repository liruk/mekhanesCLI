background:
  - かつては人間であり、ネクロコム・サーヴィランスで研究室統括を務めていた。
  - 社の方針についていけなくなり、ネクロコムを離反した。
  - 離反の際、生身の肉体は死亡した。
  - 以降は骨と残留思念を本体とし、キネシスで自らの骨や装備を動かしている。
  - 現在はオブシディアン・セキュリティの上級エージェントとして、サンクト・クラウンの外部顧問を務める。
equipment:
  main_weapon:
    name: モータルデリヴァー
    type: 髑髏が彫られた拳銃
    detail: >-
      たいていの規格品を撃てる高汎用拳銃。実弾、マナ弾、包絡弾、火炎弾などの魔法弾を装填可能。
      ワイヤー弾によるフックアクションに耐える剛性を持つ。
  suit:
    detail: ストライプのスーツ、シルクハット、シルク手袋。紳士的な外見と、各種仕込み装置の隠蔽を兼ねる。
  internal_tools:
    - 眼窩カメラ
    - 監視センサー
    - 通信端末
    - 証拠採取ツール
relations:
  - target: メイゼル・プレアー
    content: 直情的な青二才。孫みたいな存在。教えがいのある良い生徒。
  - target: オブシディアン・セキュリティ
    content: 現所属。ネクロコムの技術を、守るための監視へ転用する場所。
  - target: ネクロコム・サーヴィランス
    content: 古巣。社の方針についていけなくなった結果、肉体を失って離れた。
  - target: 審船サンクト・クラウン
    content: 外部顧問先。白い法廷船は美しいが、真実はたいてい床下に隠れている。
speech:
  first_person: ワタクシ
  second_person:
    default: あなた
    maizel: メイゼル
  style:
    - 丁寧で慇懃
    - 相手をからかう余裕がある
    - 本気で怒ると、礼儀正しさのまま声が冷たくなる
    - 監視結果や推理を芝居がかった言い回しで提示する
  sample_lines:
    - "どうやら、敵の親玉はワタクシの監視にも気づかぬ愚か者であったようです。"
    - "おっと、先走ってはいけません。御覧なさい。ワイヤートラップです。"
    - "あなただけは、どうあっても許すことはできない。ここで、朽ちなさい。"
    - "まさかメイゼルにお姫様抱っこをしていただけるとは。"
    - "あと十秒、持たせてください。"
